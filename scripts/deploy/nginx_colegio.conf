# scripts/deploy/nginx_colegio.conf
# ====================================================
# Configuración nginx para Colegio Asistencia (LAN)
# ====================================================
#
# OPCIÓN A — HTTP simple (para LAN interna, más fácil):
#   Copiar este archivo y usar el bloque HTTP de abajo.
#   Los datos viajan sin cifrar — aceptable si la LAN es privada.
#
# OPCIÓN B — HTTPS con certificado autofirmado (recomendado):
#   1. Generar certificado:
#      openssl req -x509 -newkey rsa:4096 -keyout /etc/ssl/private/colegio.key \
#        -out /etc/ssl/certs/colegio.crt -days 3650 -nodes \
#        -subj "/C=PE/ST=Lima/L=Lima/O=Colegio/CN=192.168.1.100"
#   2. Copiar este archivo a /etc/nginx/sites-available/colegio
#   3. Activar: ln -s /etc/nginx/sites-available/colegio /etc/nginx/sites-enabled/
#   4. Probar:  nginx -t
#   5. Recargar: systemctl reload nginx
#
# Instalación nginx: sudo apt-get install nginx
# ====================================================

# ──────────────────────────────────────────────────
# OPCIÓN A: HTTP puro (sin TLS)
# ──────────────────────────────────────────────────
# server {
#     listen 80;
#     server_name 192.168.1.100;  # IP del servidor
#
#     location / {
#         proxy_pass         http://127.0.0.1:8000;
#         proxy_http_version 1.1;
#         proxy_set_header   Upgrade $http_upgrade;
#         proxy_set_header   Connection "upgrade";
#         proxy_set_header   Host $host;
#         proxy_set_header   X-Real-IP $remote_addr;
#         proxy_read_timeout 86400;
#     }
# }

# ──────────────────────────────────────────────────
# OPCIÓN B: HTTPS con certificado autofirmado (recomendado)
# ──────────────────────────────────────────────────

# Upstream: FastAPI corriendo en localhost:8000
upstream colegio_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirigir HTTP → HTTPS
server {
    listen      80;
    server_name 192.168.1.100;  # ← CAMBIAR a la IP real del servidor

    return 301 https://$host$request_uri;
}

# Servidor HTTPS principal
server {
    listen      443 ssl http2;
    server_name 192.168.1.100;  # ← CAMBIAR a la IP real del servidor

    # Certificados (generados con el comando openssl arriba)
    ssl_certificate     /etc/ssl/certs/colegio.crt;
    ssl_certificate_key /etc/ssl/private/colegio.key;

    # Configuración TLS moderna
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # Headers de seguridad
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin;

    # Tamaño máximo de upload (fotos de alumnos)
    client_max_body_size 50M;

    # Timeouts para el reconocimiento facial (puede tardar)
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;

    # ── API REST ──────────────────────────────────
    location /api/ {
        proxy_pass         http://colegio_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── WebSocket /ws/scan ────────────────────────
    # Los WebSockets necesitan headers especiales para el upgrade
    location /ws/ {
        proxy_pass         http://colegio_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;   # 24h: las conexiones WS son persistentes
        proxy_buffering    off;
    }

    # ── Panel Admin Web ───────────────────────────
    location /admin {
        proxy_pass         http://colegio_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Documentación Swagger ─────────────────────
    location /docs {
        proxy_pass         http://colegio_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://colegio_backend;
    }

    # ── Raíz y health check ───────────────────────
    location / {
        proxy_pass         http://colegio_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Logs
    access_log /var/log/nginx/colegio_access.log;
    error_log  /var/log/nginx/colegio_error.log warn;
}
