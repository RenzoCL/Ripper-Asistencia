# pytest.ini
# Configuración de pytest para el proyecto Colegio Asistencia

[pytest]
# Directorio raíz de tests
testpaths = tests

# Mostrar detalles completos al fallar
addopts =
    -v
    --tb=short
    --no-header
    -rN

# Formato del log durante los tests
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S

# Ignorar warnings de deprecación de SQLAlchemy y Pydantic
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
